name: Build Antyx-OS ISO

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Antyx-OS
    types:
      - completed

permissions:
  contents: read
  packages: read

jobs:
  build-iso:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install BlueBuild CLI
        run: |
          curl -fsSL \
            https://github.com/blue-build/cli/releases/latest/download/bluebuild-linux-x86_64 \
            -o /usr/local/bin/bluebuild
          chmod +x /usr/local/bin/bluebuild
          bluebuild --version

      - name: Build ISO
        run: |
          sudo bluebuild generate-iso \
            --iso-name Antyx-OS-0.3-alpha.iso \
            image ghcr.io/x7zvv/antyx-os:latest

      - name: Find ISO
        run: |
          find . -type f -name "*.iso" -ls

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Antyx-OS-0.3-alpha
          path: |
            **/*.iso
          if-no-files-found: error
          retention-days: 14
