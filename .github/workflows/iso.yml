name: Build Antyx-OS ISO

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Antyx-OS
    types:
      - completed

permissions:
  contents: read
  packages: read

jobs:
  build-iso:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install BlueBuild CLI
        run: |
          podman run --pull always --rm \
            ghcr.io/blue-build/cli:latest-installer | sudo bash
          bluebuild --version

      - name: Build ISO
        run: |
          sudo bluebuild generate-iso \
            --iso-name Antyx-OS-0.4-alpha.iso \
            image ghcr.io/x7zvv/antyx-os:latest

      - name: Generate SHA256 checksum
        run: |
          ISO="$(find . -type f -name 'Antyx-OS-0.4-alpha.iso' -print -quit)"
          test -n "$ISO"
          sha256sum "$ISO" > "${ISO}.sha256"
          ls -lh "$ISO" "${ISO}.sha256"

      - name: Upload ISO
        uses: actions/upload-artifact@v7
        with:
          name: Antyx-OS-0.4-alpha
          path: |
            **/Antyx-OS-0.4-alpha.iso
            **/Antyx-OS-0.4-alpha.iso.sha256
          if-no-files-found: error
          retention-days: 30
