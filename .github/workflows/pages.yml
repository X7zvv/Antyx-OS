name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: GitHub Pages einrichten
        uses: actions/configure-pages@v5

      - name: Website hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Website veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
