---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: antyx-os
description: Antyx-OS Secure Gaming - a clean, security-conscious KDE gaming image.

# Stable NVIDIA-open gaming base for modern NVIDIA GPUs.
base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable

modules:
  # Copy the repository files into the image first.
  - type: files
    files:
      - source: system
        destination: /

  # Install Antyx Hub from the RPM copied into /usr/share/antyx/packages.
  - type: script
    snippets:
      - |
        set -eux
        HUB_RPM="/usr/share/antyx/packages/antyx-hub-0.1.0-1.x86_64.rpm"

        test -f "$HUB_RPM"
        dnf5 install -y "$HUB_RPM"
        test -x /usr/bin/antyx-hub

  # Apply Antyx integration after all files are present.
  - type: script
    snippets:
      - |
        set -eu

        chmod 0755 /usr/libexec/antyx-first-login
        chmod 0755 /usr/libexec/antyx-fastfetch
        chmod 0755 /usr/libexec/antyx-branding-cleanup
        chmod 0755 /usr/bin/antyx-verify

        # Force the Antyx Fastfetch preset.
        if [ -x /usr/bin/fastfetch ] && [ ! -e /usr/libexec/fastfetch.real ]; then
          mv /usr/bin/fastfetch /usr/libexec/fastfetch.real
        fi
        ln -sfn /usr/libexec/antyx-fastfetch /usr/bin/fastfetch

        # Remove all known user-facing branding from the base image.
        /usr/libexec/antyx-branding-cleanup

        # Enable Antyx boot branding.
        plymouth-set-default-theme antyx
        update-desktop-database /usr/share/applications || true

        # Native Steam is supplied by the gaming base.
        command -v steam >/dev/null 2>&1

  # System Flatpaks are provisioned for all users on first boot.
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        repo:
          title: Flathub (system)
        install:
          - com.brave.Browser
          - com.modrinth.ModrinthApp
          - com.discordapp.Discord
          - com.spotify.Client
          - com.heroicgameslauncher.hgl
          - net.lutris.Lutris
          - com.obsproject.Studio
          - com.github.tchx84.Flatseal
          - io.missioncenter.MissionCenter
          - org.videolan.VLC
          - com.vysp3r.ProtonPlus

  # Antyx identity. Fedora remains in ID_LIKE for compatibility.
  - type: os-release
    properties:
      ID: antyx
      ID_LIKE: fedora
      NAME: Antyx-OS
      PRETTY_NAME: Antyx-OS Secure Gaming
      VARIANT: KDE NVIDIA
      VARIANT_ID: antyx
      LOGO: antyx-os
      ANSI_COLOR: "0;38;2;149;85;255"
      HOME_URL: https://antyx-os.netlify.app
      DOCUMENTATION_URL: https://github.com/X7zvv/Antyx-OS/tree/main/docs
      SUPPORT_URL: https://github.com/X7zvv/Antyx-OS/issues
      BUG_REPORT_URL: https://github.com/X7zvv/Antyx-OS/issues

  - type: initramfs
  - type: signing
