---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: antyx-os
description: Antyx-OS Secure Gaming – a security-conscious KDE gaming image based on Bazzite.

# RTX 50-series / modern NVIDIA GPUs.
base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable

modules:
  # Antyx commands and balanced security defaults.
  - type: files
    files:
      - source: system
        destination: /

  # Desktop applications installed from Flathub.
  # Steam, MangoHud, Gamescope and core gaming components come from Bazzite.
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        repo:
          title: Flathub (system)
        install:
          - com.brave.Browser
          - com.heroicgameslauncher.hgl
          - net.lutris.Lutris
          - com.discordapp.Discord
          - com.obsproject.Studio
          - com.github.tchx84.Flatseal
          - io.missioncenter.MissionCenter
          - org.videolan.VLC
          - com.vysp3r.ProtonPlus

  # Show Antyx-OS in system information while keeping Bazzite/Fedora compatibility.
  - type: os-release
    properties:
      NAME: Antyx-OS
      PRETTY_NAME: Antyx-OS Secure Gaming
      VARIANT: KDE NVIDIA
      VARIANT_ID: antyx
      HOME_URL: https://github.com/X7zvv/antyx-os
      DOCUMENTATION_URL: https://github.com/X7zvv/antyx-os/tree/main/docs
      SUPPORT_URL: https://github.com/X7zvv/antyx-os/issues
      BUG_REPORT_URL: https://github.com/X7zvv/antyx-os/issues

  # Installs the public cosign policy/key generated for your repository.
  - type: signing
